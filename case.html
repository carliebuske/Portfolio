<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Case — Carlie Nicole</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;700;800;900&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    .case { max-width: var(--max); margin: 0 auto; padding: clamp(2rem,6vh,4rem) clamp(1.25rem,4vw,3rem); }
    .case__back { font-family:"Space Mono",monospace; font-size:0.74rem; letter-spacing:0.08em; text-transform:uppercase; color:var(--ink); opacity:0.7; text-decoration:none; }
    .case__back:hover { color: var(--oxblood); opacity:1; }
    .case__reel { aspect-ratio:16/9; background:var(--ink); margin:1.5rem 0; border-radius:6px; overflow:hidden; display:flex; align-items:center; justify-content:center; color:var(--cream); font-family:"Space Mono",monospace; font-size:0.8rem; letter-spacing:0.1em; text-transform:uppercase; }
    .case__reel video, .case__reel iframe, .case__reel img { width:100%; height:100%; object-fit:cover; border:0; image-orientation:from-image; }
    .case__title { font-family:"Archivo",sans-serif; font-weight:900; font-size:clamp(2.4rem,8vw,5.5rem); letter-spacing:-0.03em; line-height:0.92; }
    .case__meta { font-family:"Space Mono",monospace; font-size:0.8rem; letter-spacing:0.08em; text-transform:uppercase; color:var(--ink); opacity:0.6; margin:1rem 0 1.6rem; }
    .case__story { font-size:clamp(1.2rem,2.4vw,1.7rem); line-height:1.4; max-width:50ch; }
    .case__result { margin-top:1.6rem; font-family:"Archivo",sans-serif; font-weight:800; font-size:1.4rem; color:var(--oxblood); }
    /* Pinterest-style masonry: natural image ratios, no cropping */
    .case__gallery { margin-top:2.5rem; column-count:3; column-gap:var(--gap); }
    .case__gallery img { width:100%; height:auto; border-radius:18px; image-orientation:from-image; display:block; margin:0 0 var(--gap); break-inside:avoid; }
    @media (max-width:900px){ .case__gallery { column-count:2; } }
    @media (max-width:520px){ .case__gallery { column-count:1; } }
    .case__indev { display:inline-block; background:var(--oxblood); color:var(--cream); font-family:"Space Mono",monospace; font-size:0.66rem; letter-spacing:0.1em; text-transform:uppercase; padding:0.3rem 0.6rem; border-radius:3px; margin-bottom:1rem; }
  </style>
</head>

</body>
